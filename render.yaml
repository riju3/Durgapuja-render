# render.yaml - Render deployment configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (Node/Express API) ──────────────────────────────
  - type: web
    name: durgapuja-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure secret
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        sync: false          # Set to your frontend Render URL

  # ── Frontend (React Static Site) ───────────────────────────
  - type: web
    name: durgapuja-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # Required for React Router
    envVars:
      - key: REACT_APP_API_URL
        sync: false                # Set to your backend Render URL + /api
